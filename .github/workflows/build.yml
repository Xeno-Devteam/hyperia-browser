name: Build Hyperia Browser

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  name: Build Hyperia Browser

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Electron app
        run: npx electron-builder --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            dist-electron/**
            dist/**
            release/**

release:
  needs: build
  runs-on: ubuntu-latest

  steps:
    - name: Download all artifacts into one folder
      uses: actions/download-artifact@v4
      with:
        path: release-assets

    - name: Show what was downloaded (debug step 👀)
      run: ls -R release-assets

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        files: release-assets/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        with:
  files: |
    release-assets/windows-latest-build/**
    release-assets/ubuntu-latest-build/**
    release-assets/macos-latest-build/**
